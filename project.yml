name: WallshaderIOS
options:
  bundleIdPrefix: com.innovationBox
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  AmbientBackdrop:
    path: ../wallshader/Packages/AmbientBackdrop
  ShaderCore:
    path: ../wallshader/Packages/ShaderCore
  WallshaderModel:
    path: ../wallshader/Packages/WallshaderModel
  WallshaderPalettes:
    path: ../wallshader/Packages/WallshaderPalettes
  WallshaderStoreCore:
    path: ../wallshader/Packages/WallshaderStoreCore
  UnsplashKit:
    path: ../wallshader/Packages/UnsplashKit

settings:
  base:
    SWIFT_VERSION: "5.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    # Known gotcha: XcodeGen hardcodes Info.plist versions unless these are
    # wired through info.properties below.
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: 8M6SS7KXKY
    TARGETED_DEVICE_FAMILY: "1,2"
  configs:
    # Automatic signing everywhere: simulator builds need no certificate
    # (Xcode ad-hoc signs them), device builds sign with the team's
    # development certificate + auto provisioning. Signing lives HERE, not
    # in the Xcode UI — the project is regenerated by xcodegen (same
    # gotcha as the Mac repo).
    Debug:
      CODE_SIGN_STYLE: Automatic
    Release:
      CODE_SIGN_STYLE: Automatic

targets:
  # Quick Look preview appex: renders a tapped .wallshader's true look
  # (Messages/Mail/Files). Data-based provider — no UI, tiny footprint.
  WallshaderQuickLook:
    type: app-extension
    platform: iOS
    sources:
      - path: QuickLook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.innovationBox.wallshader.quicklook
        PRODUCT_NAME: WallshaderQuickLook
        SKIP_INSTALL: YES
    dependencies:
      - package: ShaderCore
      - package: WallshaderModel
      # The extension POINT's context class lives in QuickLook.framework —
      # without this explicit link the system logs "Unable to find
      # NSExtensionContextClass (QLPreviewExtensionServiceContext_iOS)"
      # and silently falls back to the generic document card.
      - sdk: QuickLook.framework
    info:
      path: QuickLook/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDisplayName: Wallshader Preview
        NSExtension:
          NSExtensionPointIdentifier: com.apple.quicklook.preview
          NSExtensionMainStoryboard: MainInterface
          NSExtensionAttributes:
            QLSupportedContentTypes:
              - com.innovationBox.wallshader.wallpaper
            QLSupportsSearchableItems: false

  WallshaderIOS:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes: ["**/.gitkeep"]
      # The Mac repo's Icon Composer icon is multiplatform; referenced
      # directly from the sibling repo (source of truth for shared assets).
      - path: ../wallshader/Assets/WallshaderAppIcon.icon
      - path: ../wallshader/Assets/test-image.jpg
        buildPhase: resources
      - path: App/PrivacyInfo.xcprivacy
        buildPhase: resources
      - path: ../wallshader/Vendor/paper-shaders/LICENSE
        buildPhase: resources
      - path: ../wallshader/Vendor/paper-shaders/NOTICE
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.innovationBox.wallshader
        PRODUCT_NAME: Wallshader
        ASSETCATALOG_COMPILER_APPICON_NAME: WallshaderAppIcon
      configs:
        # Release carries iCloud/CloudKit (Phase D); Debug/simulator builds
        # are unsigned and fall back to local-only via the runtime guard.
        Release:
          CODE_SIGN_ENTITLEMENTS: App/WallshaderIOS-Release.entitlements
    dependencies:
      - package: AmbientBackdrop
      - package: ShaderCore
      - package: WallshaderModel
      - package: WallshaderPalettes
      - package: WallshaderStoreCore
      - package: UnsplashKit
      - target: WallshaderQuickLook
        embed: true
    postBuildScripts:
      - name: Copy Unsplash config (optional, gitignored secret)
        script: |
          CONFIG="$SRCROOT/Config/unsplash-config.json"
          if [ ! -f "$CONFIG" ] && [ -f "$SRCROOT/../wallshader/Config/unsplash-config.json" ]; then
            CONFIG="$SRCROOT/../wallshader/Config/unsplash-config.json"
          fi
          if [ -f "$CONFIG" ]; then
            cp "$CONFIG" "$BUILT_PRODUCTS_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/"
          fi
        basedOnDependencyAnalysis: false
    info:
      path: App/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDisplayName: Wallshader
        ITSAppUsesNonExemptEncryption: false
        NSPhotoLibraryAddUsageDescription: "Wallshader saves your finished wallpapers to your photo library so you can set them from Settings."
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # iPad is LANDSCAPE-ONLY by design (the edit layout builds on it);
        # fullscreen-required, since windowed apps can't restrict rotation.
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: true
        UTImportedTypeDeclarations: []
        # public.content marks the file as a user document (a bare
        # public.data reads as inert binary — Messages showed a dead
        # bubble); Owner rank + in-place opening give Files/AirDrop their
        # open-in-Wallshader affordances.
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.innovationBox.wallshader.wallpaper
            UTTypeDescription: Wallshader Wallpaper
            UTTypeConformsTo:
              - public.data
              - public.content
            UTTypeTagSpecification:
              public.filename-extension:
                - wallshader
        CFBundleDocumentTypes:
          - CFBundleTypeName: Wallshader Wallpaper
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSItemContentTypes:
              - com.innovationBox.wallshader.wallpaper
        LSSupportsOpeningDocumentsInPlace: true

  # Hermetic logic tests (no app host) over the shared packages + app-level
  # tables, mirroring the Mac repo's test-target philosophy.
  WallshaderIOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/WallshaderIOSTests
    dependencies:
      - package: ShaderCore
      - package: WallshaderModel
      - package: WallshaderStoreCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.innovationBox.wallshader.tests
        GENERATE_INFOPLIST_FILE: YES

  # Minimal XCUITest smoke (C10): launch, library visible, editor opens.
  WallshaderIOSUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/WallshaderIOSUITests
    dependencies:
      - target: WallshaderIOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.innovationBox.wallshader.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: WallshaderIOS

schemes:
  WallshaderIOS:
    build:
      targets:
        WallshaderIOS: all
    run:
      config: Debug
      # Same local StoreKit testing mechanism as the Mac repo.
      storeKitConfiguration: Config/WallshaderStore.storekit
      # Xcode's Metal diagnostics layer chokes our renderer on hardware
      # (most tiles blank, detail hangs) while the SAME binary launched
      # without Xcode runs perfectly — root-caused 2026-07-19 by installing
      # a CLI build via devicectl. Release/production never runs with
      # these layers; keep Xcode runs matching production.
      enableGPUFrameCaptureMode: disabled
      enableGPUValidationMode: disabled
      # The debugger attach is part of the same choking environment; Run
      # now installs-and-launches exactly like production. Flip back to
      # true when a breakpoint session is actually needed (task #39).
      debugEnabled: false
    test:
      config: Debug
      targets:
        - WallshaderIOSTests
        - WallshaderIOSUITests

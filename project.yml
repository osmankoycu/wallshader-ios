name: WallshaderIOS
options:
  bundleIdPrefix: com.innovationBox
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  AmbientBackdrop:
    path: ../wallshader/Packages/AmbientBackdrop
  ShaderCore:
    path: ../wallshader/Packages/ShaderCore
  WallshaderModel:
    path: ../wallshader/Packages/WallshaderModel
  WallshaderPalettes:
    path: ../wallshader/Packages/WallshaderPalettes
  WallshaderStoreCore:
    path: ../wallshader/Packages/WallshaderStoreCore
  UnsplashKit:
    path: ../wallshader/Packages/UnsplashKit

settings:
  base:
    SWIFT_VERSION: "5.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    # Known gotcha: XcodeGen hardcodes Info.plist versions unless these are
    # wired through info.properties below.
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: 8M6SS7KXKY
    TARGETED_DEVICE_FAMILY: "1,2"
  configs:
    # Simulator Debug builds are unsigned — no signing friction for the
    # autonomous run. Device provisioning -> OSMAN-TODO.
    Debug:
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGNING_ALLOWED: NO
    Release:
      CODE_SIGN_STYLE: Automatic

targets:
  WallshaderIOS:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes: ["**/.gitkeep"]
      # The Mac repo's Icon Composer icon is multiplatform; referenced
      # directly from the sibling repo (source of truth for shared assets).
      - path: ../wallshader/Assets/WallshaderAppIcon.icon
      - path: ../wallshader/Assets/test-image.jpg
        buildPhase: resources
      - path: App/PrivacyInfo.xcprivacy
        buildPhase: resources
      - path: ../wallshader/Vendor/paper-shaders/LICENSE
        buildPhase: resources
      - path: ../wallshader/Vendor/paper-shaders/NOTICE
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.innovationBox.wallshader
        PRODUCT_NAME: Wallshader
        ASSETCATALOG_COMPILER_APPICON_NAME: WallshaderAppIcon
    dependencies:
      - package: AmbientBackdrop
      - package: ShaderCore
      - package: WallshaderModel
      - package: WallshaderPalettes
      - package: WallshaderStoreCore
      - package: UnsplashKit
    postBuildScripts:
      - name: Copy Unsplash config (optional, gitignored secret)
        script: |
          CONFIG="$SRCROOT/Config/unsplash-config.json"
          if [ ! -f "$CONFIG" ] && [ -f "$SRCROOT/../wallshader/Config/unsplash-config.json" ]; then
            CONFIG="$SRCROOT/../wallshader/Config/unsplash-config.json"
          fi
          if [ -f "$CONFIG" ]; then
            cp "$CONFIG" "$BUILT_PRODUCTS_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/"
          fi
        basedOnDependencyAnalysis: false
    info:
      path: App/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDisplayName: Wallshader
        ITSAppUsesNonExemptEncryption: false
        NSPhotoLibraryAddUsageDescription: "Wallshader saves your finished wallpapers to your photo library so you can set them from Settings."
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UTImportedTypeDeclarations: []
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.innovationBox.wallshader.wallpaper
            UTTypeDescription: Wallshader Wallpaper
            UTTypeConformsTo:
              - public.data
            UTTypeTagSpecification:
              public.filename-extension:
                - wallshader
        CFBundleDocumentTypes:
          - CFBundleTypeName: Wallshader Wallpaper
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSItemContentTypes:
              - com.innovationBox.wallshader.wallpaper
        LSSupportsOpeningDocumentsInPlace: false

  # Hermetic logic tests (no app host) over the shared packages + app-level
  # tables, mirroring the Mac repo's test-target philosophy.
  WallshaderIOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/WallshaderIOSTests
    dependencies:
      - package: ShaderCore
      - package: WallshaderModel
      - package: WallshaderStoreCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.innovationBox.wallshader.tests
        GENERATE_INFOPLIST_FILE: YES

  # Minimal XCUITest smoke (C10): launch, library visible, editor opens.
  WallshaderIOSUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/WallshaderIOSUITests
    dependencies:
      - target: WallshaderIOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.innovationBox.wallshader.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: WallshaderIOS

schemes:
  WallshaderIOS:
    build:
      targets:
        WallshaderIOS: all
    run:
      config: Debug
      # Same local StoreKit testing mechanism as the Mac repo.
      storeKitConfiguration: Config/WallshaderStore.storekit
    test:
      config: Debug
      targets:
        - WallshaderIOSTests
        - WallshaderIOSUITests
